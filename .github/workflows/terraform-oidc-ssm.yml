name: Terraform OIDC + SSM

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      operation:
        description: "Terraform operation"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      aws_region:
        description: "AWS region for OIDC/SSM calls"
        required: true
        type: string
        default: "eu-north-1"
      ref:
        description: "Git ref to run (branch/tag/SHA)"
        required: true
        type: string
        default: "main"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-via-ssm:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: terraform-${{ inputs.environment }}
      cancel-in-progress: false

    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_ENV: ${{ inputs.environment }}
      TF_OPERATION: ${{ inputs.operation }}
      TARGET_REF: ${{ inputs.ref }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-terraform-${{ github.run_id }}

      - name: Resolve management instance from ASG
        id: resolve-instance
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names mgmt-asg \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`]|[0].InstanceId' \
            --output text)"

          if [[ -z "${INSTANCE_ID}" || "${INSTANCE_ID}" == "None" ]]; then
            echo "No InService instance found in mgmt-asg" >&2
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Guard destroy to dev only
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${TF_OPERATION}" == "destroy" && "${TF_ENV}" != "dev" ]]; then
            echo "terraform destroy is allowed only for dev environment" >&2
            exit 1
          fi

      - name: Send Terraform command over SSM
        id: ssm
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID='${{ steps.resolve-instance.outputs.instance_id }}'

          read -r -d '' REMOTE_SCRIPT <<'SCRIPT' || true
          set -euo pipefail

          RUN_DIR="/tmp/gha-tf-${{ github.run_id }}-${{ github.run_attempt }}"
          REPO_DIR="${RUN_DIR}/repo"
          REPO_SLUG="${{ github.repository }}"
          TARGET_REF="${{ env.TARGET_REF }}"
          TF_ENV="${{ env.TF_ENV }}"
          TF_OPERATION="${{ env.TF_OPERATION }}"

          rm -rf "${RUN_DIR}"
          mkdir -p "${RUN_DIR}"

          git clone --depth 1 "https://github.com/${REPO_SLUG}.git" "${REPO_DIR}"
          cd "${REPO_DIR}"
          git fetch --depth 1 origin "${TARGET_REF}"
          git checkout --detach FETCH_HEAD

          cd "Terraform_EKS/envs/${TF_ENV}"

          terraform init -input=false -no-color

          if [[ "${TF_OPERATION}" == "plan" ]]; then
            terraform plan -input=false -no-color
          elif [[ "${TF_OPERATION}" == "apply" ]]; then
            terraform apply -input=false -auto-approve -no-color
          elif [[ "${TF_OPERATION}" == "destroy" ]]; then
            terraform destroy -input=false -auto-approve -no-color
          else
            echo "Unsupported TF_OPERATION=${TF_OPERATION}" >&2
            exit 1
          fi
          SCRIPT

          PARAMETERS_JSON="$(jq -cn --arg script "$REMOTE_SCRIPT" '{commands: [$script]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Terraform ${TF_OPERATION} ${TF_ENV} from GitHub Actions" \
            --parameters "$PARAMETERS_JSON" \
            --timeout-seconds 3600 \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        timeout-minutes: 65
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID='${{ steps.resolve-instance.outputs.instance_id }}'
          COMMAND_ID='${{ steps.ssm.outputs.command_id }}'

          ATTEMPTS=0
          MAX_ATTEMPTS=360

          while true; do
            ATTEMPTS=$((ATTEMPTS + 1))

            STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo Pending)"

            echo "Current SSM status: ${STATUS}"

            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              break
            fi

            if [[ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]]; then
              echo "SSM command did not finish in time" >&2
              aws ssm cancel-command --command-id "$COMMAND_ID" >/dev/null || true
              exit 1
            fi

            sleep 10
          done

          STDOUT_CONTENT="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text)"

          STDERR_CONTENT="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text)"

          echo "--- Remote stdout ---"
          echo "$STDOUT_CONTENT"
          echo "--- Remote stderr ---"
          echo "$STDERR_CONTENT"

          if [[ "$STATUS" != "Success" ]]; then
            echo "Terraform remote execution failed with status: $STATUS" >&2
            exit 1
          fi
